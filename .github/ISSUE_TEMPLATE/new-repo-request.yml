name: New Repository Request
description: Request a new Devices domain repository
title: "Repo Request: DEV."
labels: ["repo-request"]
body:
  - type: markdown
    attributes:
      value: |
        ## New Repository Request
        Fill in the details below and submit. A workflow will automatically create the repo and assign the dev-co-chairs team as Admin.

  - type: input
    id: repo_name
    attributes:
      label: Repository name
      description: "Must start with DEV. (e.g., DEV.my-supplement)"
      placeholder: "DEV."
    validations:
      required: true

  - type: dropdown
    id: template
    attributes:
      label: Template
      description: Which template should this repo be created from?
      options:
        - DEV.supplement-template
    validations:
      required: true

  - type: input
    id: description
    attributes:
      label: Description
      description: A short description of this document
      placeholder: "e.g., WIA Supplement for Devices domain"
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Additional notes
      description: "Optional: lead author, additional context, or any special setup needed"
      placeholder: "e.g., Lead author: @janedoe. This supplement covers..."
    validations:
      required: false
