name: Create Repository from Request

on:
  issues:
    types: [opened]

jobs:
  create-repo:
    if: contains(github.event.issue.labels.*.name, 'repo-request')
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.DEVICES_APP_ID }}
          private-key: ${{ secrets.DEVICES_APP_PRIVATE_KEY }}
          owner: IHE

      - name: Extract fields from issue body
        id: fields
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # Issue form body looks like:
          #   ### Repository name
          #   DEV.something
          #   ### Template
          #   DEV.supplement-template
          #   ...

          REPO_NAME=$(echo "$ISSUE_BODY" | awk '/^### Repository name/{getline; getline; print}' | xargs)
          TEMPLATE=$(echo "$ISSUE_BODY" | awk '/^### Template/{getline; getline; print}' | xargs)
          DESCRIPTION=$(echo "$ISSUE_BODY" | awk '/^### Description/{getline; getline; print}' | xargs)

          echo "repo_name=$REPO_NAME" >> "$GITHUB_OUTPUT"
          echo "template=$TEMPLATE" >> "$GITHUB_OUTPUT"
          echo "description=$DESCRIPTION" >> "$GITHUB_OUTPUT"

          echo "### Parsed Fields" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Repo:** $REPO_NAME" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Template:** $TEMPLATE" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Description:** $DESCRIPTION" >> "$GITHUB_STEP_SUMMARY"

      - name: Validate repo name
        run: |
          REPO_NAME="${{ steps.fields.outputs.repo_name }}"
          if [[ -z "$REPO_NAME" ]]; then
            echo "::error::Could not parse repository name from issue body"
            exit 1
          fi
          if [[ ! "$REPO_NAME" =~ ^DEV\. ]]; then
            echo "::error::Repository name must start with 'DEV.' — got '$REPO_NAME'"
            exit 1
          fi

      - name: Create repository from template
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh api \
            --method POST \
            /repos/IHE/${{ steps.fields.outputs.template }}/generate \
            -f owner="IHE" \
            -f name="${{ steps.fields.outputs.repo_name }}" \
            -f description="${{ steps.fields.outputs.description }}" \
            -F include_all_branches=true \
            -F private=false

      - name: Wait for repo to be ready
        run: sleep 5

      - name: Assign dev-co-chairs team
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh api \
            --method PUT \
            /orgs/IHE/teams/dev-co-chairs/repos/IHE/${{ steps.fields.outputs.repo_name }} \
            -f permission="admin"

      - name: Comment on issue with result
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --body "Repository created successfully!

          - **Repo:** [IHE/${{ steps.fields.outputs.repo_name }}](https://github.com/IHE/${{ steps.fields.outputs.repo_name }})
          - **Template:** ${{ steps.fields.outputs.template }}
          - **Team:** dev-co-chairs (Admin)

          The dev-co-chairs team has Admin access. Add contributors via the team or repo settings."

      - name: Close issue
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh issue close ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --reason completed
